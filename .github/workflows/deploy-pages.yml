name: Deploy Pages

# Publishes the Guidewire MCP architecture diagram to GitHub Pages.
#
# Custom domain: https://guidewire-mcp.intentsolutions.io/
#   /                              → architecture diagram (this repo's
#                                    project page; was demo.intentsolutions.io
#                                    /guidewire-mcp/ pre-2026-05-04)
#   /engineer-design-diagram/      → vanity-redirect to /
#
# Triggers on push-to-main when the static pages or the diagram source change;
# also workflow_dispatch for manual rebuilds.

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "000-docs/blueprint/09-DR-DIAG-architecture.mmd"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assemble site
        run: |
          mkdir -p _site
          # Pages content + CNAME + vanity redirect
          cp -r pages/* _site/
          # Diagram source — fetched at runtime by the index.html page
          cp 000-docs/blueprint/09-DR-DIAG-architecture.mmd \
             _site/09-DR-DIAG-architecture.mmd
          echo "Built site:"
          find _site -type f | sort
          echo "CNAME:"
          cat _site/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
