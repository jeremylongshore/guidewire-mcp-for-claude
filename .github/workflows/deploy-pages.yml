name: Deploy Pages

# Publishes the demo hub + per-project diagram pages to GitHub Pages.
#
# Custom domain: https://demo.intentsolutions.io/
#   /                       → hub index (lists available diagrams)
#   /guidewire-mcp/         → guidewire architecture diagram (this repo)
#   /<future-project>/      → future demo (added by appending a card to the
#                             hub's pages/index.html and a subdir under pages/)
#
# Triggers on push-to-main when the static pages or the diagram source change;
# also workflow_dispatch for manual rebuilds.

on:
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "000-docs/blueprint/09-DR-DIAG-architecture.mmd"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assemble site
        run: |
          mkdir -p _site
          # 1. Hub index, CNAME, and any future top-level assets
          cp -r pages/* _site/
          # 2. Per-project diagram source(s) — each project's .mmd lives in
          #    its repo's blueprint dir and is copied to the matching subdir.
          cp 000-docs/blueprint/09-DR-DIAG-architecture.mmd \
             _site/guidewire-mcp/09-DR-DIAG-architecture.mmd
          # Future projects: add additional `cp <project>/.../diagram.mmd
          # _site/<project-slug>/diagram.mmd` lines here.
          echo "Built site:"
          find _site -type f | sort
          echo "CNAME:"
          cat _site/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
