name: CI

# Paperwork-phase guard: jobs no-op until E1 introduces package.json + the
# pnpm workspace. GW-2.3 (E1 sub-bead) replaces the npm scaffolding here
# with the full pnpm + Biome + Vitest + @intentsolutions/audit-harness
# pipeline.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight (paperwork-phase)
    runs-on: ubuntu-latest
    outputs:
      has_package_json: ${{ steps.check.outputs.has_package_json }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          if [ -f package.json ]; then
            echo "has_package_json=true" >> "$GITHUB_OUTPUT"
            echo "package.json found — full CI will run."
          else
            echo "has_package_json=false" >> "$GITHUB_OUTPUT"
            echo "::notice::package.json not present yet — CI in paperwork-phase no-op mode. Real CI lands in GW-2.3."
          fi

  lint:
    name: Lint
    needs: preflight
    if: needs.preflight.outputs.has_package_json == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: preflight
    if: needs.preflight.outputs.has_package_json == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
