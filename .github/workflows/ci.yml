name: CI

# Real pipeline (E1+ — replaces paperwork-no-op). Runs lint, typecheck,
# test, build in parallel, and gates smoke-reach behind the
# GUIDEWIRE_OAUTH_CLIENT_ID secret.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PNPM_VERSION: '10.8.1'
  NODE_VERSION: '22'

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck (tsc --noEmit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r exec tsc --noEmit

  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test

  build:
    name: Build (tsup)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build

  smoke-reach:
    name: Smoke-reach (librarian KB endpoints)
    # D-021 + 07-ROADMAP § E1 — gated by dev-tier creds. Skips cleanly
    # when GUIDEWIRE_OAUTH_CLIENT_ID is unset (OSS quickstart default).
    if: ${{ vars.SMOKE_REACH_ENABLED == 'true' || secrets.GUIDEWIRE_OAUTH_CLIENT_ID != '' }}
    needs: [lint, typecheck, test, build]
    runs-on: ubuntu-latest
    env:
      GUIDEWIRE_OAUTH_CLIENT_ID: ${{ secrets.GUIDEWIRE_OAUTH_CLIENT_ID }}
      GUIDEWIRE_OAUTH_CLIENT_SECRET: ${{ secrets.GUIDEWIRE_OAUTH_CLIENT_SECRET }}
      GUIDEWIRE_OAUTH_TOKEN_URL: ${{ secrets.GUIDEWIRE_OAUTH_TOKEN_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm smoke-reach
