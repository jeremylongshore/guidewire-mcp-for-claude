name: Secrets Scan

# Runs gitleaks against every PR + every push to main. Catches
# accidental secret commits before they enter public git history.
# This OSS repo accepts external contributions; assume sensitive
# values may slip in despite SOPS-encrypted convention.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so PR diff coverage works

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Optional: GITLEAKS_LICENSE for organization scans. Public
          # OSS repos run on the free tier without a license.
          GITLEAKS_NOTIFY_USER_LIST: "@jeremylongshore"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
