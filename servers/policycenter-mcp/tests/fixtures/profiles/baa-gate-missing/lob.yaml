# lob.yaml — Line-of-business code mappings
#
# Per 02-PRD § 6.3 and packages/schemas/src/profile/lob.ts.
#
# This is THE ONLY PLACE LOB code mapping lives. Hard-coding LOB or typelist
# values directly in tool source code is a CI failure (008 § 4.3 + § 12
# "avoid" item 1).
#
# Structure:
#   lob_mappings.<carrier_code>:
#     canonical:          cross-carrier label flowing into tool inputs
#     uwcenter_rule_set:  per-carrier UWCenter rule entity name
#     coverage_typelist:  which typelist (in typelists.yaml) holds coverage values
#
# Tools never hard-code LOB codes. The canonical value flows into tool inputs;
# the carrier code flows into Cloud API calls (02-PRD § 6.3).
#
# Schema versioning (D-020):
#   v1.0 profile — this file contains lob_mappings only.
#   v2.0 profile — add an `aggregations:` block to this same file (NOT a 10th
#                  YAML). Each dimension declares source_field, grouping_rule,
#                  rollup_unit. Required by E2.5 aggregate-query tools.
#                  See packages/schemas/src/profile/lob.ts → LobYamlV2Schema.

lob_mappings:

  # FIXTURE INTENT: declares a health LOB while the sibling pii-policy.yaml
  # leaves baa_required.enabled at its template default of `false`. The
  # loader's checkBaaGate() must refuse this profile at boot with
  # ProfileLoadError.code === 'BAA_GATE_MISSING'.
  ACME_GROUPHEALTH:
    canonical: "GroupHealth"
    uwcenter_rule_set: "AcmeHealthRuleSet"
    coverage_typelist: "HealthCoverage"
    lob_class: "health"

  # Second LOB stays non_health to confirm the validator names only the
  # offending entries, not every entry in the file.
  ACME_COMMERCIALPROP:
    canonical: "CommercialProperty"
    uwcenter_rule_set: "AcmeCommPropRuleSet"
    coverage_typelist: "PropertyCoverage"

