# Gradle wrapper pinned to 8.7 (current stable as of 2026-05).
# Regenerate the wrapper scripts via: gradle wrapper --gradle-version 8.7
# After regeneration the gradlew / gradlew.bat stubs in this directory
# must be replaced with the generated scripts (they are currently stubs —
# see the comments at the top of each file).
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
