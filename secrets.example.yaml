# SOPS-encrypted secrets — REFERENCE / TEMPLATE only.
#
# This file shows the SHAPE of secrets.<env>.sops.yaml without
# real values. Copy to e.g. `secrets.dev.sops.yaml` and encrypt with:
#
#     sops --encrypt --in-place secrets.dev.sops.yaml
#
# Or use the IS-standard bootstrap helper (when SOPS+age is fully
# scaffolded for this repo):
#
#     sops-init   # idempotent; creates .sops.yaml, .env.sops, etc.
#
# DO NOT put real values in this file — it's an example, committed
# in plaintext. Real values live in secrets.<env>.sops.yaml (encrypted)
# or .env.sops (encrypted dotenv form).

guidewire:
  # Per-tenant Cloud API access. One block per sandbox/customer tenant.
  sandboxes:
    - tenant_tag: "sandbox-jeremy-dev"
      release: "Palisades"
      hub_oauth_url: "https://your-hub-host.guidewire.com/oauth2/token"
      client_id: "EXAMPLE-CLIENT-ID-NOT-REAL"
      client_secret: "EXAMPLE-SECRET-NOT-REAL"
      scopes:
        - "policy.read"
        - "claim.read"
      pc_base_url: "https://your-pc-host.guidewire.com/pc/rest"
      cc_base_url: "https://your-cc-host.guidewire.com/cc/rest"
      bc_base_url: "https://your-bc-host.guidewire.com/bc/rest"

# Vendor-partner access (One Inc, etc.) — populate when applicable
vendors:
  one_inc:
    api_key: "EXAMPLE-NOT-REAL"
    base_url: "https://api.oneinc.com/v1"

# Observability sinks — Sentry DSN, OTel collector, etc.
observability:
  sentry_dsn: "https://EXAMPLE@oXXX.ingest.sentry.io/YYY"
  otel_collector_endpoint: "https://otel.example.com:4318"

# Audit store (Postgres for hash-chain audit trail)
audit:
  postgres_url: "postgresql://USER:PASS@HOST:5432/guidewire_audit"
